services:
  mongo-real:
    container_name: hx141-mongo-db
    image: mongo:5.0
    restart: unless-stopped
    volumes:
      - hx141_mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh -u admin -p admin --authenticationDatabase admin --eval \"db.adminCommand('ping')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-real:
    container_name: hx141-redis-cache
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  genieacs-real:
    build:
      context: ../../genieacs
      dockerfile: Dockerfile
    container_name: hx141-genieacs-acs
    restart: unless-stopped
    ports:
      - "7548:7547"
      - "7558:7557"
      - "7568:7567"
      - "3010:3000"
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: mongodb://admin:admin@mongo-real:27017/genieacs?authSource=admin
      GENIEACS_UI_JWT_SECRET: hx141_real_lab_secret
      GENIEACS_CWMP_INTERFACE: 0.0.0.0
      GENIEACS_NBI_INTERFACE: 0.0.0.0
      GENIEACS_FS_INTERFACE: 0.0.0.0
      GENIEACS_UI_INTERFACE: 0.0.0.0
      GENIEACS_CWMP_PORT: 7547
      GENIEACS_NBI_PORT: 7557
      GENIEACS_FS_PORT: 7567
      GENIEACS_UI_PORT: 3000
    volumes:
      - ../../genieacs/config:/opt/genieacs/ext
      - hx141_genieacs_logs:/var/log/genieacs
    depends_on:
      mongo-real:
        condition: service_healthy
      redis-real:
        condition: service_healthy

  # ---------------------------------------------------------
  # Captura de tráfico CWMP/TR-069
  # ---------------------------------------------------------
  sniffer:
    container_name: hx141-sniffer-cwmp
    image: corfr/tcpdump
    restart: "no"

    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Comparte el espacio de red de GenieACS.
    # Por eso se captura el puerto interno 7547,
    # no el puerto 7548 publicado en Windows.
    network_mode: "service:genieacs-real"

    volumes:
      - ./captures:/data

    depends_on:
      genieacs-real:
        condition: service_started

    command:
      - "-i"
      - "any"
      - "-nn"
      - "-s"
      - "0"
      - "-U"
      - "-w"
      - "/data/cwmp_hx141.pcap"
      - "-c"
      - "10000"
      - "tcp"
      - "port"
      - "7547"
  
    # ---------------------------------------------------------
  # Exportador Prometheus para el HX141 real
  # ---------------------------------------------------------
  hx141-exporter:
    container_name: hx141-prometheus-exporter
    build:
      context: ./exporter-real
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      GENIEACS_NBI_URL: http://genieacs-real:7557
      GENIEACS_DEVICE_ID: 105A95-HX141-225A154001356
      EXPORTER_PORT: "9108"
      ONLINE_MAX_AGE_SECONDS: "600"

      HX141_NODE_NAMES: >-
        {"10:5A:95:29:7D:B5":"CONTROLLER","10:5A:95:29:71:AC":"AGENTE-1","10:5A:95:29:7B:E4":"AGENTE-2"}

    ports:
      - "9109:9108"

    depends_on:
      genieacs-real:
        condition: service_started
  
    # ---------------------------------------------------------
  # Prometheus del laboratorio HX141 real
  # ---------------------------------------------------------
  prometheus-real:
    container_name: hx141-prometheus
    image: prom/prometheus:latest
    restart: unless-stopped

    ports:
      - "9091:9090"

    volumes:
      - type: bind
        source: ./prometheus-real/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: false

      - type: volume
        source: hx141_prometheus_data
        target: /prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

    depends_on:
      hx141-exporter:
        condition: service_started

  # ---------------------------------------------------------
  # Grafana del laboratorio HX141 real
  # ---------------------------------------------------------
  grafana-real:
    container_name: hx141-grafana
    image: grafana/grafana:latest
    restart: unless-stopped

    ports:
      - "3002:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - ./grafana-real/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-real/dashboards:/var/lib/grafana/dashboards:ro
      - hx141_grafana_data:/var/lib/grafana

    depends_on:
      prometheus-real:
        condition: service_started

volumes:
  hx141_mongo_data:
  hx141_genieacs_logs:
  hx141_prometheus_data:
  hx141_grafana_data:
