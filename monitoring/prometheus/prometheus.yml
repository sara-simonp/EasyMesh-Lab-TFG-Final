global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "easymesh-network-simulator"
    static_configs:
      - targets:
          - "easymesh-network-simulator:9200"

  - job_name: "csv-prometheus-exporter"
    static_configs:
      - targets:
          - "csv-prometheus-exporter:9210"

  - job_name: "genieacs-qoe-exporter"
    static_configs:
      - targets:
          - "genieacs-qoe-exporter:9108"
